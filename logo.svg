<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <g fill="white">
    <!-- Anvil / Forge base -->
    <rect x="136" y="320" width="240" height="60" rx="10"/>
    <rect x="176" y="280" width="160" height="50" rx="8"/>
    <!-- Hammer -->
    <rect x="300" y="140" width="40" height="120" rx="8" transform="rotate(-30 320 200)"/>
    <rect x="280" y="120" width="80" height="60" rx="8" transform="rotate(-30 320 150)"/>
    <!-- Sparks -->
    <circle cx="180" cy="180" r="8" fill="#fbbf24"/>
    <circle cx="220" cy="150" r="6" fill="#fbbf24"/>
    <circle cx="160" cy="220" r="5" fill="#fbbf24"/>
    <circle cx="200" cy="200" r="7" fill="#fbbf24"/>
    <circle cx="140" cy="180" r="4" fill="#fbbf24"/>
    <!-- Gear/Skill icon -->
    <circle cx="256" cy="200" r="50" fill="#f59e0b" stroke="white" stroke-width="8"/>
    <circle cx="256" cy="200" r="20" fill="white"/>
    <!-- Teeth -->
    <g fill="#f59e0b">
      <rect x="246" y="140" width="20" height="20" rx="4"/>
      <rect x="246" y="240" width="20" height="20" rx="4"/>
      <rect x="196" y="190" width="20" height="20" rx="4"/>
      <rect x="296" y="190" width="20" height="20" rx="4"/>
      <rect x="206" y="156" width="20" height="20" rx="4" transform="rotate(45 216 166)"/>
      <rect x="286" y="156" width="20" height="20" rx="4" transform="rotate(-45 296 166)"/>
      <rect x="206" y="224" width="20" height="20" rx="4" transform="rotate(-45 216 234)"/>
      <rect x="286" y="224" width="20" height="20" rx="4" transform="rotate(45 296 234)"/>
    </g>
    <!-- Lightning bolt -->
    <path d="M280 100 L260 140 L280 140 L270 180 L300 130 L280 130 L290 100 Z" fill="#fbbf24"/>
  </g>
</svg>
