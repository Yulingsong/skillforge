stages:
  - test
  - build
  - publish

variables:
  NPM_VERSION: "20"

test:
  stage: test
  image: node:${NPM_VERSION}
  script:
    - npm ci
    - npm run lint
    - npm run typecheck
    - npm test
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

build:
  stage: build
  image: node:${NPM_VERSION}
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

publish:
  stage: publish
  image: node:${NPM_VERSION}
  script:
    - npm ci
    - npm run build
    - npm publish --access public
  only:
    - main
    - master
  when: manual
